<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Strike: Overdrive | Official Site</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&family=Noto+Sans+SC:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00f2ff; --secondary: #7000ff; --dark: #020204; --bonus: #ffce00; }
        body { background-color: var(--dark); color: white; font-family: 'Rajdhani', sans-serif; scroll-behavior: smooth; overflow-x: hidden; }
        .city-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: linear-gradient(to bottom, rgba(2, 2, 4, 0.4) 0%, rgba(2, 2, 4, 0.9) 100%), url('https://images.unsplash.com/photo-1514565131-fce0801e5785?q=80&w=2000&auto=format&fit=crop'); background-size: cover; background-position: center; }
        .hero-view { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        .text-glow { text-shadow: 0 0 20px rgba(0, 242, 255, 0.8), 0 0 40px rgba(255, 255, 255, 0.3); }
        .glass { background: rgba(10, 10, 20, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-primary { background: white; color: black; transition: 0.3s; }
        .btn-primary:hover { background: var(--primary); box-shadow: 0 0 25px var(--primary); transform: scale(1.05); }
        .btn-secondary { border: 1px solid rgba(255, 255, 255, 0.2); transition: 0.3s; }
        .btn-secondary:hover { border-color: var(--primary); background: rgba(0, 242, 255, 0.05); }
        .ship-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); transition: 0.3s; cursor: pointer; }
        .ship-card.active { border-color: var(--primary); background: rgba(0, 242, 255, 0.05); box-shadow: 0 0 15px rgba(0, 242, 255, 0.1); opacity: 1 !important; }
        .biome-box { width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; border-radius: 12px; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.3s; }
        .pilot-card { background: #000; border: 2px solid var(--pc, #00f2ff); border-radius: 1rem; overflow: hidden; transition: transform .35s ease, box-shadow .35s ease; display: flex; flex-direction: column; }
        .pilot-img { aspect-ratio: 16 / 9; width: 100%; object-fit: cover; }
        .pilot-body { padding: 1.1rem; border-top: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div class="city-bg"></div>
    <nav class="fixed w-full z-50 px-8 py-4 flex justify-between items-center bg-black/20 backdrop-blur-md border-b border-white/5">
        <div class="text-xl font-orbitron font-bold tracking-tighter">SKY STRIKE<span class="text-cyan-400">: OVERDRIVE</span></div>
    </nav>

    <section class="hero-view px-6 text-center">
        <h1 class="text-7xl font-orbitron font-bold uppercase mb-2 text-glow italic">SKY STRIKE</h1>
    </section>

    <section id="dashboard" class="py-32 px-6 max-w-7xl mx-auto">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <div class="lg:col-span-5 glass p-10 rounded-[2.5rem]">
                <h3 class="text-xs font-orbitron uppercase text-cyan-400 font-bold mb-6">Combat Aircraft</h3>
                <div class="grid grid-cols-2 gap-4" id="ship-selector">
                    <div class="ship-card active p-4 rounded-2xl flex flex-col items-center"><img src="assets/ship1.png" style="width: 80px;"><p class="text-[10px] mt-2">SKYSTRIKE DART</p></div>
                    <div class="ship-card p-4 rounded-2xl flex flex-col items-center"><img src="assets/ship2.png" style="width: 80px;"><p class="text-[10px] mt-2">NEON VIPER</p></div>
                    <div class="ship-card p-4 rounded-2xl flex flex-col items-center"><img src="assets/ship3.png" style="width: 80px;"><p class="text-[10px] mt-2">TANK MANTIS</p></div>
                    <div class="ship-card p-4 rounded-2xl flex flex-col items-center"><img src="assets/ship4.png" style="width: 80px;"><p class="text-[10px] mt-2">GHOST WRAITH</p></div>
                </div>
            </div>
            <div class="lg:col-span-7 glass p-10 rounded-[2.5rem]">
                <h3 class="text-xs font-orbitron uppercase text-purple-400 font-bold mb-6">Global Sectors</h3>
                </div>
        </div>
    </section>
</body>
</html>
